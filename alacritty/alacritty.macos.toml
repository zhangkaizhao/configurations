# https://alacritty.org/config-alacritty.html

# 2023-12-28 Alacritty uses TOML instead of YAML since 0.13.

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "Ubuntu Sans Mono"

[window]
opacity = 0.8
# Make Option key behave as Alt. Default: "None" (macOS only)
option_as_alt = "Both"

[window.dimensions]
columns = 102
lines = 29
